name: Manual make release

on:
  workflow_dispatch:
    inputs:
      level:
        description: "Release level"
        required: true
        type: choice
        default: dev
        options:
          - production
          - rc
          - beta
          - alpha
          - dev

permissions:
  pull-requests: write
  contents: write
  id-token: write
  
jobs:
  make-release:
    uses: ./.github/workflows/common_make_release.yaml
    secrets: inherit
    with:
      level: ${{ inputs.level == 'production' && 'none' || inputs.level }}
